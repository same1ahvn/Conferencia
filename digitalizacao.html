<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Digitalização de Prontuários</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    background:#f4f7f6;
}

/* HEADER */
header{
    background:#0b6e4f;
    color:white;
    padding:20px;
    text-align:center;
}

/* BOTÃO VOLTAR */
.voltar{
    display:inline-block;
    margin:20px;
    text-decoration:none;
    color:#0b6e4f;
    font-weight:600;
}

/* CONTAINER */
.container{
    max-width:800px;
    margin:0 auto;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:15px;
    background:#10a56f;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
}

button:hover{
    background:#0b6e4f;
}
</style>
</head>

<body>

<header>
<h2>Digitalização de Prontuários</h2>
</header>

<a href="index.html" class="voltar">← Voltar</a>

<div class="container">
<div class="card">

<h3>Registro de Digitalização</h3>

<input type="text" placeholder="Nome do paciente">
<input type="text" placeholder="Número do prontuário">

<select>
<option>Status</option>
<option>Digitalizado</option>
<option>Pendente</option>
<option>Erro</option>
</select>

<button>Salvar</button>

</div>
</div>

</body>
</html>
