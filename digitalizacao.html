<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Digitalização - SAME</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#f4f7f6;
}

/* HEADER */
header{
    background:#0b6e4f;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header a{
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* CONTAINER */
.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* FORM */
.form{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-top:20px;
}

input,select{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#10a56f;
    color:white;
    padding:15px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#0b6e4f;
}

/* FOOTER */
footer{
    text-align:center;
    margin-top:40px;
    padding:20px;
    color:#555;
}
</style>
</head>

<body>

<header>
<h2>Digitalização</h2>
<a href="index.html">Voltar</a>
</header>

<div class="container">

<div class="card">
<h2>Registrar Digitalização</h2>

<form class="form">
<input type="text" placeholder="Nome do Paciente">
<input type="text" placeholder="Número do Prontuário">

<select>
<option>Status</option>
<option>Digitalizado</option>
<option>Pendente</option>
<option>Erro</option>
</select>

<button>Salvar</button>
</form>

</div>

</div>

<footer>
<p>SAME • Sistema de Arquivo Médico</p>
</footer>

</body>
</html>
